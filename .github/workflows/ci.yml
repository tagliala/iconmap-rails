name: CI
on: [push, pull_request]
jobs:
  tests:
    strategy:
      matrix:
        ruby-version:
          - "3.2"
          - "3.3"
          - "3.4"
          - "4.0"
        gemfile:
          - gemfiles/rails_7_2_propshaft.gemfile
          - gemfiles/rails_7_2_sprockets.gemfile
          - gemfiles/rails_8_0_propshaft.gemfile
          - gemfiles/rails_8_0_sprockets.gemfile
          - gemfiles/rails_8_1_propshaft.gemfile
          - gemfiles/rails_8_1_sprockets.gemfile
        channel: ['stable']

        exclude:
          - ruby-version: "4.0"
            gemfile: gemfiles/rails_7_2_propshaft.gemfile
          - ruby-version: "4.0"
            gemfile: gemfiles/rails_7_2_sprockets.gemfile

        include:
          - ruby-version: "3.3"
            gemfile: gemfiles/rails_main_propshaft.gemfile
            channel: 'experimental'
          - ruby-version: "3.3"
            gemfile: gemfiles/rails_main_sprockets.gemfile
            channel: 'experimental'

          - ruby-version: "3.4"
            gemfile: gemfiles/rails_main_propshaft.gemfile
            channel: 'experimental'
          - ruby-version: "3.4"
            gemfile: gemfiles/rails_main_sprockets.gemfile
            channel: 'experimental'

          - ruby-version: "4.0"
            gemfile: gemfiles/rails_main_propshaft.gemfile
            channel: 'experimental'
          - ruby-version: "4.0"
            gemfile: gemfiles/rails_main_sprockets.gemfile
            channel: 'experimental'

          - ruby-version: "ruby-head"
            gemfile: gemfiles/rails_8_0_propshaft.gemfile
            channel: 'experimental'
          - ruby-version: "ruby-head"
            gemfile: gemfiles/rails_8_0_sprockets.gemfile
            channel: 'experimental'

          - ruby-version: "ruby-head"
            gemfile: gemfiles/rails_8_1_propshaft.gemfile
            channel: 'experimental'
          - ruby-version: "ruby-head"
            gemfile: gemfiles/rails_8_1_sprockets.gemfile
            channel: 'experimental'

          - ruby-version: "ruby-head"
            gemfile: gemfiles/rails_main_propshaft.gemfile
            channel: 'experimental'
          - ruby-version: "ruby-head"
            gemfile: gemfiles/rails_main_sprockets.gemfile
            channel: 'experimental'

    name: ${{ format('Tests (Ruby {0}, {1} - {2})', matrix.ruby-version, matrix.gemfile, matrix.channel) }}
    runs-on: ubuntu-latest

    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}

    continue-on-error: ${{ matrix.channel != 'stable' }}

    steps:
      - uses: actions/checkout@v6

      - name: Remove Gemfile lock
        run: |
          rm -f $BUNDLE_GEMFILE.lock

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Run tests
        run: |
          bundle exec rake test
